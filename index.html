<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Unheard - Classroom Prototype</title>

  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <link rel="stylesheet" href="style.css"/>
  <script defer src="script.js"></script>
</head>

<body>

<button id="toggleUI">Toggle Notes</button>

<div id="editorPanel">
  <h2>Presentation Notes</h2>

  <label>Title</label>
  <input id="slideTitle" type="text"/>

  <label>Text</label>
  <textarea id="slideText"></textarea>

  <div class="editorButtons">
    <button id="saveBtn">Update</button>
    <button id="prevEditorBtn">Previous</button>
    <button id="nextEditorBtn">Next</button>
  </div>

  <p id="pageStatus"></p>
</div>

<a-scene>

  <!-- Camera -->
  <a-entity position="0 1.6 8.2">
    <a-camera>
      <a-cursor raycaster="objects: .clickable" color="#333"></a-cursor>
    </a-camera>
  </a-entity>

  <!-- LIGHTING (soft & balanced) -->
  <a-entity light="type: ambient; intensity: 0.7; color: #ffffff"></a-entity>
  <a-entity light="type: directional; intensity: 0.5; color: #dfe6ee" position="2 6 3"></a-entity>

  <!-- FLOOR -->
  <a-plane rotation="-90 0 0" width="22" height="24" color="#e9edf2"></a-plane>

  <!-- WALLS -->
  <a-box position="0 2 -10" width="22" height="4" depth="0.2" color="#f5f7fa"></a-box>
  <a-box position="0 2 10" width="22" height="4" depth="0.2" color="#f5f7fa"></a-box>
  <a-box position="-11 2 0" width="0.2" height="4" depth="20" color="#eef1f5"></a-box>
  <a-box position="11 2 0" width="0.2" height="4" depth="20" color="#eef1f5"></a-box>

  <!-- FRONT BOARD (clean contrast) -->
  <a-plane position="0 2.4 -9.85" width="9" height="2.8" color="#dfe6ee"></a-plane>

  <!-- WINDOWS -->
  <a-plane position="-10.88 2.4 -4" rotation="0 90 0" width="3" height="1.8" color="#cfe3ff"></a-plane>
  <a-plane position="-10.88 2.4 0" rotation="0 90 0" width="3" height="1.8" color="#cfe3ff"></a-plane>
  <a-plane position="-10.88 2.4 4" rotation="0 90 0" width="3" height="1.8" color="#cfe3ff"></a-plane>

  <!-- DESK -->
  <a-box position="0 0.65 5.3" width="4.8" height="0.18" depth="1.9" color="#c8b6a6"></a-box>

  <!-- LAPTOP -->
  <a-box position="0 0.83 4.95" width="1.8" height="0.06" depth="1.05" color="#2c2f33"></a-box>

  <!-- SCREEN -->
  <a-plane id="screenBg"
    position="0 1.48 4.53"
    rotation="-48 0 0"
    width="2.25"
    height="1.35"
    color="#1f2933">
  </a-plane>

  <!-- TEXT -->
  <a-text id="screenTitle"
    position="-0.70 1.90 4.60"
    rotation="-48 0 0"
    color="#ffffff"
    width="2.1"
    wrap-count="14">
  </a-text>

  <a-text id="screenText"
    position="-0.70 1.66 4.61"
    rotation="-48 0 0"
    color="#e6edf5"
    width="1.95"
    wrap-count="18">
  </a-text>

  <a-text id="screenPage"
    position="0.48 1.02 4.60"
    rotation="-48 0 0"
    color="#9bbce0"
    width="1.2">
  </a-text>

  <!-- CLEAN BUTTONS -->
  <a-box id="prevBtn" class="clickable"
    position="-0.8 0.93 5.7"
    width="0.7" height="0.16" depth="0.25"
    color="#e4e7ec">
  </a-box>

  <a-text
    value="Prev"
    position="-1.02 0.97 5.85"
    color="#333"
    width="1.5">
  </a-text>

  <a-box id="nextBtn" class="clickable"
    position="0.8 0.93 5.7"
    width="0.7" height="0.16" depth="0.25"
    color="#d0e2ff">
  </a-box>

  <a-text
    value="Next"
    position="0.58 0.97 5.85"
    color="#1a3d6d"
    width="1.5">
  </a-text>

  <!-- AUDIENCE (subtle silhouettes) -->
  <a-entity id="audience">
    <a-cylinder position="-4 1 2" radius="0.25" height="1.2" color="#2b2b2b"></a-cylinder>
    <a-cylinder position="0 1 2" radius="0.25" height="1.2" color="#2b2b2b"></a-cylinder>
    <a-cylinder position="4 1 2" radius="0.25" height="1.2" color="#2b2b2b"></a-cylinder>

    <a-cylinder position="-4 1 -1" radius="0.25" height="1.2" color="#2b2b2b"></a-cylinder>
    <a-cylinder position="0 1 -1" radius="0.25" height="1.2" color="#2b2b2b"></a-cylinder>
    <a-cylinder position="4 1 -1" radius="0.25" height="1.2" color="#2b2b2b"></a-cylinder>

    <a-cylinder position="-4 1 -4" radius="0.25" height="1.2" color="#2b2b2b"></a-cylinder>
    <a-cylinder position="0 1 -4" radius="0.25" height="1.2" color="#2b2b2b"></a-cylinder>
    <a-cylinder position="4 1 -4" radius="0.25" height="1.2" color="#2b2b2b"></a-cylinder>
  </a-entity>

  <a-sky color="#f2f6fb"></a-sky>

</a-scene>
</body>
</html>
